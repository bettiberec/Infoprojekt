<!-------------------- Main -------------------->
<section class="backpic">
  <section class="booking-page">
    <h1 class="booking-title">ELVESZETT PIRAMIS</h1>
  </section>
  <!-------------------- Pic -------------------->
  <section class="pic">
     <img src="images/piramis_oldal_kozep_hatter.png" alt="Piramis">
  </section>
<!-------------------- Jelzés -------------------->
  <section>
    <div class="booking-legend">
      <div class="legend-item"><img style="width: 105px; height: 115px;", src="images/foglalt.png" alt="Foglalt"> Foglalt</div>
      <div class="legend-item"><img style="width: 200px; height: 115px;", src="images/szabad.png" alt="Szabad"> Szabad</div>
    </div>
  </section>
<!-------------------- Naptár-------------------->
  <section>
    <div class="week-navigation-wrapper">
      <span id="prevWeekBtn" class="week-arrow">⬅</span>
      <div class="booking-table-wrapper">
        <table class="booking-table" id="bookingTable"></table>
      </div>
      <span id="nextWeekBtn" class="week-arrow">➡</span>
    </div>
<section class="backpic2">
    <div id="selectedSlotInfo" class="selected-slot-info"></div>


  <div id="bookingAction" style="text-align:center; margin-top:20px; display:none; margin-bottom:20px">
    <button id="openBookingFormBtn" class="red-btn">Foglalás</button>
  </div>
<!-------------------- Foglalási form -------------------->
  <section>
  <div id="bookingFormContainer" class="basicform">
    <h2 class="formtitle">Személyes adatok</h2>

    <form id="bookingForm">
      <div style="margin-bottom:15px;">
        <label class="required">Név</label><br>
        <input id="name" required style="width:95%; padding:10px; margin-top:5px;">
      </div>

      <div style="margin-bottom:15px;">
        <label class="required">Email</label><br>
          <input type="email" id="email" required style="width:95%; padding:10px; margin-top:5px;">
      </div>

      <div style="margin-bottom:15px;">
        <label class="required">Telefonszám</label><br>
        <input id="phone" required style="width:95%; padding:10px; margin-top:5px;">
      </div>

      <div style="margin-bottom:15px;">
        <label class="required">Létszám</label><br>
        <select id="guests" required style="width:99%; padding:10px; margin-top:5px;">
          <option value="">Válassz létszámot</option>
          <option value="2">2 fő</option>
          <option value="3">3 fő</option>
          <option value="4">4 fő</option>
          <option value="5">5 fő</option>
          <option value="6">6 fő</option>
        </select>
      </div>

      <div style="margin-bottom:15px; ">
        <label>Megjegyzés</label><br>
        <textarea id="note" rows="4" style="width:95%; padding:10px; margin-top:5px;"></textarea>
      </div>

      <div style="text-align:center;">
        <button type="submit" class="red-btn">Foglalás elküldése</button>
      </div>
    </form>
  </div>
  </section>
<!-------------------- Script -------------------->
<script>
  //Változók beállítása
  const roomId = "piramis";
  const timeSlots = ["09:00", "10:30", "12:00", "13:30", "15:00", "16:30", "18:00", "19:30", "21:00"];
  const dayNames = ["Hétfő", "Kedd", "Szerda", "Csütörtök", "Péntek", "Szombat", "Vasárnap"];
  const bookingTable = document.getElementById("bookingTable");
  const prevWeekBtn = document.getElementById("prevWeekBtn");
  const nextWeekBtn = document.getElementById("nextWeekBtn");
  const selectedSlotInfo = document.getElementById("selectedSlotInfo");
  const today = new Date();
  let currentWeekOffset = 0;
  const maxWeekOffset = 4;
  const bookingAction = document.getElementById("bookingAction");
  const openBookingFormBtn = document.getElementById("openBookingFormBtn");
  const bookingFormContainer = document.getElementById("bookingFormContainer");
  const bookingForm = document.getElementById("bookingForm");
  let selectedDate = null;
  let selectedTime = null;

  //Dátum megjelnítési formája
  function formatDate(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const day = String(date.getDate()).padStart(2, "0");
    return `${year}-${month}-${day}`;
  }

  //Fejlécbe rövidített dátumok megjelenítése
  function formatShortDate(date) {
    const day = String(date.getDate()).padStart(2, "0");
    const month = String(date.getMonth() + 1).padStart(2, "0");
    return `${month}/${day}`;
  }

  //Hétfőt külön le kellett kérdezni, hogy legyen kiindulási alapja a hétnek
  function getMonday(date) {
    const d = new Date(date);
    const day = d.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);
    d.setHours(0, 0, 0, 0);
    return d;
  }

  //A hét többi napja lekérdezés
  function getWeekDates(offset) {
    const monday = getMonday(today);
    monday.setDate(monday.getDate() + offset * 7);

    const dates = [];
    for (let i = 0; i < 7; i++) {
      const date = new Date(monday);
      date.setDate(monday.getDate() + i);
      dates.push(date);
    }
    return dates;
  }

  //Időpontok lekérdezése
  async function fetchSlotsForDate(dateString) {
    const response = await fetch(`http://localhost:3000/api/slots?roomId=${roomId}&date=${dateString}`);
    return await response.json();
  }

  //Nyilak konfigurálása. 4 hétre előre lehet foglalni. Ha nem lehet tovább lapozni akkor button disable.
  function updateWeekButtons() {
    if (currentWeekOffset <= 0) {
      prevWeekBtn.classList.add("disabled");
    } else {
      prevWeekBtn.classList.remove("disabled");
    }

    if (currentWeekOffset >= maxWeekOffset) {
      nextWeekBtn.classList.add("disabled");
    } else {
      nextWeekBtn.classList.remove("disabled");
    }
  }

  //Táblázat renderelése
  async function renderWeekTable() {
    const weekDates = getWeekDates(currentWeekOffset);
    bookingTable.innerHTML = "";
    selectedSlotInfo.textContent = "";

    //Fejléc
    const headerRow = document.createElement("tr");

    const emptyHeader = document.createElement("th");
    emptyHeader.textContent = "";
    headerRow.appendChild(emptyHeader);

    for (let i = 0; i < weekDates.length; i++) {
      const th = document.createElement("th");
      th.classList.add("day-header");
      th.innerHTML = `${dayNames[i]}<span class="day-date">${formatShortDate(weekDates[i])}</span>`;
      headerRow.appendChild(th);
    }
    bookingTable.appendChild(headerRow);

    //Adatok lekérése a hét minden napjára
    const weeklyData = {};
    for (const date of weekDates) {
      const dateString = formatDate(date);
      const slotData = await fetchSlotsForDate(dateString);
      weeklyData[dateString] = slotData.slots;
    }
    //Sorok
    for (const time of timeSlots) {
      const row = document.createElement("tr");

      const timeCell = document.createElement("td");
      timeCell.textContent = time;
      timeCell.classList.add("time-cell");
      row.appendChild(timeCell);

      for (const date of weekDates) {
        const dateString = formatDate(date);
        const daySlots = weeklyData[dateString] || [];
        const slot = daySlots.find(s => s.time === time);

        const td = document.createElement("td");

        //Nem foglalható időpontok (hétköznap délelőtt)
        if (!slot) {
          td.innerHTML = '<span class="slot-unavailable">—</span>';
        }
        //Szabad időpontok megjelenítése
        else if (slot.available) {
          const btn = document.createElement("button");
          const img = document.createElement("img");
          img.src = "images/szabad.png"; 
          img.alt = "szabad";
          img.style.width = "50px";   

          btn.appendChild(img);

          btn.classList.add("slot-btn", "slot-free");

          btn.addEventListener("click", () => {
            selectedDate = dateString;
            selectedTime = time;

            selectedSlotInfo.textContent = `Kiválasztott időpont: ${dateString} - ${time}`;
            bookingAction.style.display = "block";
            bookingFormContainer.style.display = "none";
          });
          td.appendChild(btn);
        }
        //Nem szabad időpontok megjelenítése
        else {
          const btn = document.createElement("button");
          const img = document.createElement("img");
          img.src = "images/foglalt.png"; 
          img.alt = "foglalt";
          img.style.width = "30px";   

          btn.appendChild(img);
          btn.classList.add("slot-btn", "slot-booked");
          btn.disabled = true;
          td.appendChild(btn);
        }
        row.appendChild(td);
      }
      bookingTable.appendChild(row);
    }
    updateWeekButtons();
  }
  //Előző hét gombhoz event listener
  prevWeekBtn.addEventListener("click", () => {
    if (currentWeekOffset > 0) {
      currentWeekOffset--;
      renderWeekTable();
    }
  });
  //Következő hét gombhoz event listener
  nextWeekBtn.addEventListener("click", () => {
    if (currentWeekOffset < maxWeekOffset) {
      currentWeekOffset++;
      renderWeekTable();
    }
  });
  renderWeekTable();


//////////////////////////////////////////////////////////////////////////////////////////
//                              Foglalási Form logika                                  //
/////////////////////////////////////////////////////////////////////////////////////////

//Mikor lenyílik a form akkor automatikusan legördül
  openBookingFormBtn.addEventListener("click", () => {
    if (selectedDate && selectedTime) {
      bookingFormContainer.style.display = "block";

      bookingFormContainer.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }
  });
  //Figyeli, hogy a user mikor submit-tolja a formot.
  bookingForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const isValid = bookingForm.reportValidity();
    if (!isValid) {
      return;
    }

    //Adatok átadása
    const bookingData = {
      roomId: roomId,
      date: selectedDate,
      time: selectedTime,
      name: document.getElementById("name").value.trim(),
      email: document.getElementById("email").value.trim(),
      phone: document.getElementById("phone").value.trim(),
      guests: Number(document.getElementById("guests").value),
      note: document.getElementById("note").value.trim()
    };

    //API hívás
    try {
      const response = await fetch("http://localhost:3000/api/bookings", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(bookingData)
      });

      const result = await response.json();

      //Visszajelzések
      if (!response.ok) {
        alert(result.message || "Hiba történt a foglalás során.");
        return;
      }

      alert("Foglalás sikeresen mentve!");

      //"Újraindítja" az oldalt
      bookingForm.reset();
      bookingFormContainer.style.display = "none";
      bookingAction.style.display = "none";
      selectedSlotInfo.textContent = "";

      renderWeekTable();
    } catch (error) {
        console.error("Hiba a foglaláskor:", error);
        alert("Nem sikerült elküldeni a foglalást.");
    }
  });
</script>

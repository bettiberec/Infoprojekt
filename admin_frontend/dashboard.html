<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="admin-navbar">
    <a href="dashboard.html" class="admin-logo">Logó</a>
  </div>

  <section class="dashboard-page">
    <h1 class="dashboard-title">Admin felület</h1>

    <div class="admin-rooms">
      <div class="admin-room-card">
        <img src="images/borton.png" alt="Börtönbüntetés">
        <div class="admin-room-content">
          <h2>Börtönbüntetés</h2>
          <a href="admin-room-borton.html" class="admin-btn" style="text-decoration:none; box-sizing:border-box;">Megtekintés</a>
        </div>
      </div>

      <div class="admin-room-card">
        <img src="images/piramis.png" alt="Elveszett piramis">
        <div class="admin-room-content">
          <h2>Elveszett piramis</h2>
          <a href="admin-room-piramis.html" class="admin-btn" style="text-decoration:none; box-sizing:border-box;">Megtekintés</a>
        </div>
      </div>

      <div class="admin-room-card">
        <img src="images/titkosugynok.png" alt="A titkosügynök küldetés">
        <div class="admin-room-content">
          <h2>A titkosügynök küldetés</h2>
          <a href="admin-room-titkosugynok.html" class="admin-btn" style="text-decoration:none; box-sizing:border-box;">Megtekintés</a>
        </div>
      </div>
    </div>
  </section>

</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Project Escape</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="main-container">
    <nav class="navbar">
      <div class="main-logo">
        <a href="INF-28 Admin Main.html">
          <img src="images/logofeher.png" alt="Project Escape logo">
        </a>
      </div>

      <div class="menu">
        <div class="menu-item">
          <button class="btn dropdownBtn" id="roomsBtn" type="button">
            Szobák
          </button>

          <div class="dropdown" id="roomsMenu">
            <a class="dropdown-link" href="admin-room-borton.html">Börtön</a>
            <a class="dropdown-link" href="admin-room-piramis.html">Piramis</a>
            <a class="dropdown-link" href="admin-room-titkosugynok.html">Ügynök</a>
          </div>
        </div>

        <a class="btn" href="admin-bevetel.html">Bevétel</a>
        <a class="btn" href="admin-fiok.html" style="background: #4f83ff;">Fiók</a>
      </div>

      <div class="right">
          <button id="kijelentkezes" class="btn btn-red" type="button">
            Kijelentkezés
          </button>
      </div>
    </nav>
  </div>


  <!----INF-29 Adatok oldal írta: Józsi---->
  <div class="adatok-container">
    <h1>Fiók adatok</h1>

    <form class="account-form">

        <div class="form-row">
            <label for="name">Név:</label>
            <input type="text" id="name" name="name" readonly value="Teszt Elek">
        </div>

        <div class="form-row">
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" readonly value="admin@escape.hu">
        </div>

        <div class="form-row">
            <label for="phone">Telefon:</label>
            <input type="text" id="phone" name="phone" readonly value="06 30 333 4444">
        </div>

        <div class="button-row">
            <button type="button" class="btn" onclick="openModal()">Jelszó Módosítása</button>
            <button type="button" class="btn" onclick="openEditModal()">Adatok Módosítása</button>
        </div>

    </form>
</div>

<!-- Jelszo módosítása ablak -->
<div id="passwordModal" class="modal">
    <div class="modal-content">
        <h2>Jelszó Módosítása</h2>

        <div class="form-row">
            <input style="background-color: white;" type="password" id="password" placeholder="Régi jelszó">
        </div>
        <div class="form-row">
            <input style="background-color: white;" type="password" id="password-new" placeholder="Új jelszó">
        </div>
        <div class="form-row">
            <input style="background-color: white;" type="password" id="password-new-again" placeholder="Új jelszó megint">
        </div>

      
        <input type="checkbox" onclick="showPassword()">Jelszó mutatása

        <div class="modal-buttons">
            <button class="ok-btn">Rendben</button>
            <button class="cancel-btn" onclick="closeModal()">Mégse</button>
        </div>
    </div>
</div>

<!-- Adatok módosítása ablak -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h2 class="edit-title">Kérem írja át a módosítani kívánt adatokat!</h2>

        <div class="form-row">
            <label>Név:</label>
            <input style="background-color: white;" type="text">
        </div>

        <div class="form-row">
            <label>E-mail:</label>
            <input style="background-color: white;" type="email">
        </div>

        <div class="form-row">
            <label>Telefon:</label>
            <input style="background-color: white;" type="text">
        </div>

        <div class="modal-buttons">
            <button class="ok-btn">Rendben</button>
            <button class="cancel-btn" onclick="closeEditModal()">Mégse</button>
        </div>
    </div>
</div>



<!---------------------------Script--------------------------->
  <script>
    //Ez a NAVBAR. Ne módosítsd!
    const roomsBtn = document.getElementById("roomsBtn");
    const roomsMenu = document.getElementById("roomsMenu");
    const logoutBtn = document.getElementById("kijelentkezes");

    roomsBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      roomsMenu.classList.toggle("show");
      roomsBtn.classList.toggle("active");
    });

    roomsMenu.addEventListener("click", function (e) {
      e.stopPropagation();
    });

    document.addEventListener("click", function () {
      roomsMenu.classList.remove("show");
      roomsBtn.classList.remove("active");
    });

    logoutBtn.addEventListener("click", function () {
      const confirmLogout = confirm("Biztos ki akar jelentkezni?");
      if (confirmLogout) {
        window.location.href = "INF-28 Admin Log in.html";
      }
    });
    //Itt ér véget a navbar!



    function openModal(){
      document.getElementById("passwordModal").style.display = "flex";
    }
    function closeModal(){
      document.getElementById("passwordModal").style.display = "none";
    }

    function openEditModal(){
      document.getElementById("editModal").style.display = "flex";
    }
    function closeEditModal(){
      document.getElementById("editModal").style.display = "none";
    }


    function showPassword() {
        var x = document.getElementById("password");
        var y = document.getElementById("password-new");
        var z = document.getElementById("password-new-again");
        
          if (x.type === "password") {
              x.type = "text";
          } else {
              x.type = "password";
          }
          if (y.type === "password") {
              y.type = "text";
          } else {
              y.type = "password";
          }
          if (z.type === "password") {
              z.type = "text";
          } else {
              z.type = "password";
          }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Admin - Börtönbüntetés</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="admin-navbar">
    <a href="dashboard.html" class="admin-logo">Logó</a>
  </div>

  <section class="admin-room-page">
    <h1 class="admin-room-title">Börtönbüntetés - Admin</h1>

    <div class="admin-week-navigation-wrapper">
      <span id="prevWeekBtn" class="admin-week-arrow">⬅</span>

      <div class="admin-table-wrapper">
        <table class="admin-booking-table" id="adminBookingTable"></table>
      </div>

      <span id="nextWeekBtn" class="admin-week-arrow">➡</span>
    </div>

    <div id="selectedSlotInfo" class="admin-selected-slot"></div>
  </section>

<script>
  const roomId = "bortonbuntetes";

  const timeSlots = ["09:00", "10:30", "12:00", "13:30", "15:00", "16:30", "18:00", "19:30", "21:00"];
  const dayNames = ["Hétfő", "Kedd", "Szerda", "Csütörtök", "Péntek", "Szombat", "Vasárnap"];

  const bookingTable = document.getElementById("adminBookingTable");
  const prevWeekBtn = document.getElementById("prevWeekBtn");
  const nextWeekBtn = document.getElementById("nextWeekBtn");
  const selectedSlotInfo = document.getElementById("selectedSlotInfo");

  const today = new Date();
  let currentWeekOffset = 0;
  const maxWeekOffset = 4;

  function formatDate(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const day = String(date.getDate()).padStart(2, "0");
    return `${year}-${month}-${day}`;
  }

  function formatShortDate(date) {
    const day = String(date.getDate()).padStart(2, "0");
    const month = String(date.getMonth() + 1).padStart(2, "0");
    return `${month}/${day}`;
  }

  function getMonday(date) {
    const d = new Date(date);
    const day = d.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);
    d.setHours(0, 0, 0, 0);
    return d;
  }

  function getWeekDates(offset) {
    const monday = getMonday(today);
    monday.setDate(monday.getDate() + offset * 7);

    const dates = [];
    for (let i = 0; i < 7; i++) {
      const date = new Date(monday);
      date.setDate(monday.getDate() + i);
      dates.push(date);
    }
    return dates;
  }

  async function fetchSlotsForDate(dateString) {
    const response = await fetch(`http://localhost:3000/api/slots?roomId=${roomId}&date=${dateString}`);

    if (!response.ok) {
      throw new Error(`API hiba: ${response.status}`);
    }

    return await response.json();
  }

  function updateWeekButtons() {
    if (currentWeekOffset <= 0) {
      prevWeekBtn.classList.add("disabled");
    } else {
      prevWeekBtn.classList.remove("disabled");
    }

    if (currentWeekOffset >= maxWeekOffset) {
      nextWeekBtn.classList.add("disabled");
    } else {
      nextWeekBtn.classList.remove("disabled");
    }
  }

  async function renderWeekTable() {
    try {
      const weekDates = getWeekDates(currentWeekOffset);
      bookingTable.innerHTML = "";
      selectedSlotInfo.textContent = "";

      const headerRow = document.createElement("tr");

      const emptyHeader = document.createElement("th");
      emptyHeader.textContent = "";
      headerRow.appendChild(emptyHeader);

      for (let i = 0; i < weekDates.length; i++) {
        const th = document.createElement("th");
        th.classList.add("admin-day-header");
        th.innerHTML = `${dayNames[i]}<span class="admin-day-date">${formatShortDate(weekDates[i])}</span>`;
        headerRow.appendChild(th);
      }

      bookingTable.appendChild(headerRow);

      const weeklyData = {};
      for (const date of weekDates) {
        const dateString = formatDate(date);
        const slotData = await fetchSlotsForDate(dateString);
        weeklyData[dateString] = slotData.slots;
      }

      for (const time of timeSlots) {
        const row = document.createElement("tr");

        const timeCell = document.createElement("td");
        timeCell.textContent = time;
        timeCell.classList.add("admin-time-cell");
        row.appendChild(timeCell);

        for (const date of weekDates) {
          const dateString = formatDate(date);
          const daySlots = weeklyData[dateString] || [];
          const slot = daySlots.find(s => s.time === time);

          const td = document.createElement("td");

          if (!slot) {
            td.innerHTML = '<span class="admin-slot-unavailable">—</span>';
          } else if (slot.available) {
            const btn = document.createElement("button");
            btn.textContent = "Szabad";
            btn.classList.add("admin-slot-btn", "admin-slot-free");

            btn.addEventListener("click", () => {
              selectedSlotInfo.textContent = `Kiválasztott időpont: ${dateString} - ${time}`;
            });

            td.appendChild(btn);
          } else {
            const btn = document.createElement("button");
            btn.textContent = "Foglalt";
            btn.classList.add("admin-slot-btn", "admin-slot-booked");
            btn.disabled = true;
            td.appendChild(btn);
          }
          row.appendChild(td);
        }
        bookingTable.appendChild(row);
      }
      updateWeekButtons();
    } catch (error) {
      console.error("Hiba az admin heti tábla betöltésekor:", error);
    }
  }

  prevWeekBtn.addEventListener("click", () => {
    if (currentWeekOffset > 0) {
      currentWeekOffset--;
      renderWeekTable();
    }
  });

  nextWeekBtn.addEventListener("click", () => {
    if (currentWeekOffset < maxWeekOffset) {
      currentWeekOffset++;
      renderWeekTable();
    }
  });

  renderWeekTable();
</script>
</body>
</html>
